name: EDM Cabo Delgado outage alert

on:
  schedule:
    # Every 4 hours (UTC). Mozambique is UTC+2.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write   # needed to commit seen_ids.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check EDM outage page
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python check_edm.py

      - name: Save alerted outage IDs
        run: |
          git config user.name "edm-alert-bot"
          git config user.email "actions@github.com"
          git add seen_ids.json || true
          git diff --cached --quiet || git commit -m "Update seen outage IDs"
          git push
